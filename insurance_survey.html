<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>보험 상담 설문지</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      background: linear-gradient(135deg, #1a3c6e 0%, #2563a8 50%, #1e90c8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      width: 100%;
      max-width: 780px;
      overflow: hidden;
    }

    /* ── 헤더 ── */
    .header {
      background: linear-gradient(135deg, #1a3c6e, #2563a8);
      color: #fff;
      padding: 28px 36px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-icon {
      width: 52px; height: 52px;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }
    .header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
    .header p  { font-size: 0.82rem; opacity: 0.8; }

    /* ── 폼 본문 ── */
    .form-body { padding: 28px 36px 32px; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 24px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; }

    .field label {
      font-size: 0.78rem;
      font-weight: 700;
      color: #1a3c6e;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .field label .num {
      width: 20px; height: 20px;
      background: #2563a8;
      color: #fff;
      border-radius: 50%;
      font-size: 0.68rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    input[type="text"],
    input[type="date"],
    input[type="tel"],
    select,
    textarea {
      border: 1.5px solid #d0daea;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 0.88rem;
      font-family: inherit;
      color: #222;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #f8fafd;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #2563a8;
      box-shadow: 0 0 0 3px rgba(37,99,168,0.12);
      background: #fff;
    }
    textarea { resize: none; height: 68px; }

    /* 라디오 / 체크박스 그룹 */
    .radio-group, .check-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .radio-group label, .check-group label {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.83rem;
      font-weight: 400;
      color: #333;
      cursor: pointer;
      background: #f0f4fb;
      border: 1.5px solid #d0daea;
      border-radius: 20px;
      padding: 5px 12px;
      transition: all 0.15s;
      user-select: none;
    }
    .radio-group input[type="radio"],
    .check-group input[type="checkbox"] {
      width: auto; padding: 0;
      accent-color: #2563a8;
    }
    .radio-group label:has(input:checked),
    .check-group label:has(input:checked) {
      background: #2563a8;
      color: #fff;
      border-color: #2563a8;
    }

    /* 범위 슬라이더 */
    .slider-wrap { display: flex; align-items: center; gap: 10px; }
    input[type="range"] {
      flex: 1;
      accent-color: #2563a8;
      cursor: pointer;
      border: none; background: none; padding: 0;
    }
    .slider-val {
      font-size: 0.85rem;
      font-weight: 700;
      color: #2563a8;
      min-width: 60px;
      text-align: right;
    }

    /* 구분선 */
    .divider {
      border: none;
      border-top: 1px dashed #d0daea;
      margin: 4px 0;
      grid-column: 1 / -1;
    }

    /* ── 제출 버튼 ── */
    .footer {
      padding: 0 36px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .btn-submit {
      width: 100%;
      max-width: 320px;
      padding: 14px;
      background: linear-gradient(135deg, #1a3c6e, #2563a8);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.1s;
      font-family: inherit;
    }
    .btn-submit:hover  { opacity: 0.88; }
    .btn-submit:active { transform: scale(0.98); }

    .note {
      font-size: 0.74rem;
      color: #888;
      text-align: center;
    }

    /* ── 완료 오버레이 ── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .overlay.show { display: flex; }
    .overlay-box {
      background: #fff;
      border-radius: 16px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
      max-width: 360px;
      width: 90%;
    }
    .overlay-box .check-icon {
      font-size: 52px;
      margin-bottom: 14px;
      display: block;
    }
    .overlay-box h2 { color: #1a3c6e; font-size: 1.25rem; margin-bottom: 8px; }
    .overlay-box p  { color: #555; font-size: 0.88rem; line-height: 1.6; }
    .btn-close {
      margin-top: 22px;
      padding: 10px 32px;
      background: #2563a8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
    }

    @media (max-width: 580px) {
      .grid { grid-template-columns: 1fr; }
      .field.full { grid-column: 1; }
      .header { padding: 20px; }
      .form-body { padding: 20px; }
      .footer { padding: 0 20px 24px; }
    }
  </style>
</head>
<body>

<div class="card">
  <!-- 헤더 -->
  <div class="header">
    <div class="header-icon">🛡️</div>
    <div>
      <h1>보험 상담 설문지</h1>
      <p>아래 항목을 작성하시면 맞춤형 보험 상담을 제공해 드립니다.</p>
    </div>
  </div>

  <form id="surveyForm" onsubmit="handleSubmit(event)">
    <div class="form-body">
      <div class="grid">

        <!-- 1. 성명 -->
        <div class="field">
          <label><span class="num">1</span> 성명</label>
          <input type="text" name="name" placeholder="홍길동" required />
        </div>

        <!-- 2. 생년월일 -->
        <div class="field">
          <label><span class="num">2</span> 생년월일</label>
          <input type="date" name="birth" required />
        </div>

        <!-- 3. 성별 -->
        <div class="field">
          <label><span class="num">3</span> 성별</label>
          <div class="radio-group">
            <label><input type="radio" name="gender" value="남성" required /> 남성</label>
            <label><input type="radio" name="gender" value="여성" /> 여성</label>
          </div>
        </div>

        <!-- 4. 연락처 -->
        <div class="field">
          <label><span class="num">4</span> 연락처</label>
          <input type="tel" name="phone" placeholder="010-0000-0000" required />
        </div>

        <hr class="divider" />

        <!-- 5. 직업 -->
        <div class="field">
          <label><span class="num">5</span> 직업 / 직종</label>
          <select name="job" required>
            <option value="" disabled selected>선택하세요</option>
            <option>직장인 (사무직)</option>
            <option>직장인 (현장직)</option>
            <option>자영업</option>
            <option>전문직 (의사·변호사 등)</option>
            <option>주부</option>
            <option>학생</option>
            <option>프리랜서</option>
            <option>기타</option>
          </select>
        </div>

        <!-- 6. 건강상태 -->
        <div class="field">
          <label><span class="num">6</span> 현재 건강 상태</label>
          <div class="radio-group">
            <label><input type="radio" name="health" value="매우 건강" required /> 매우 건강</label>
            <label><input type="radio" name="health" value="양호" /> 양호</label>
            <label><input type="radio" name="health" value="지병 있음" /> 지병 있음</label>
          </div>
        </div>

        <!-- 7. 관심 보험 종류 -->
        <div class="field full">
          <label><span class="num">7</span> 관심 있는 보험 종류 (복수 선택 가능)</label>
          <div class="check-group">
            <label><input type="checkbox" name="type" value="생명보험" /> 생명보험</label>
            <label><input type="checkbox" name="type" value="실손의료보험" /> 실손의료</label>
            <label><input type="checkbox" name="type" value="암보험" /> 암보험</label>
            <label><input type="checkbox" name="type" value="종신보험" /> 종신보험</label>
            <label><input type="checkbox" name="type" value="연금보험" /> 연금보험</label>
            <label><input type="checkbox" name="type" value="자동차보험" /> 자동차</label>
            <label><input type="checkbox" name="type" value="운전자보험" /> 운전자</label>
            <label><input type="checkbox" name="type" value="어린이보험" /> 어린이</label>
          </div>
        </div>

        <!-- 8. 월 보험료 예산 -->
        <div class="field full">
          <label><span class="num">8</span> 월 보험료 예산</label>
          <div class="slider-wrap">
            <input type="range" name="budget" min="1" max="50" value="10" step="1"
              oninput="document.getElementById('budgetVal').textContent = this.value + '만 원'" />
            <span class="slider-val" id="budgetVal">10만 원</span>
          </div>
        </div>

        <!-- 9. 부양가족 -->
        <div class="field">
          <label><span class="num">9</span> 부양가족 여부</label>
          <select name="family" required>
            <option value="" disabled selected>선택하세요</option>
            <option>없음 (1인 가구)</option>
            <option>배우자</option>
            <option>배우자 + 자녀</option>
            <option>부모님</option>
            <option>기타</option>
          </select>
        </div>

        <!-- 10. 상담 희망 시간 -->
        <div class="field">
          <label><span class="num">10</span> 상담 희망 시간대</label>
          <div class="radio-group">
            <label><input type="radio" name="time" value="오전 (9~12시)" required /> 오전</label>
            <label><input type="radio" name="time" value="오후 (12~18시)" /> 오후</label>
            <label><input type="radio" name="time" value="저녁 (18시~)" /> 저녁</label>
          </div>
        </div>

      </div><!-- /grid -->
    </div><!-- /form-body -->

    <div class="footer">
      <div class="field" style="width:100%; margin-bottom:14px;">
        <label style="font-size:0.78rem; font-weight:700; color:#1a3c6e; display:flex; align-items:center; gap:6px; margin-bottom:6px;">
          <span style="width:20px;height:20px;background:#2563a8;color:#fff;border-radius:50%;font-size:0.68rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;">✏</span>
          요청사항 (선택)
        </label>
        <textarea name="memo" placeholder="궁금한 점이나 특별히 요청하실 사항을 자유롭게 적어주세요." style="width:100%;height:80px;"></textarea>
      </div>
      <button type="submit" class="btn-submit">📋 상담 신청하기</button>
      <p class="note">입력하신 정보는 보험 상담 목적으로만 사용되며 안전하게 보호됩니다.</p>
    </div>
  </form>
</div>

<!-- 완료 오버레이 -->
<div class="overlay" id="overlay">
  <div class="overlay-box">
    <span class="check-icon">✅</span>
    <h2>신청이 완료되었습니다!</h2>
    <p>담당 상담사가 선택하신 시간대에<br/>연락드리겠습니다.<br/>감사합니다.</p>
    <button class="btn-close" onclick="closeOverlay()">확인</button>
  </div>
</div>

<script>
  const BOT_TOKEN = '8782652295:AAHWWXP_qJKcCDVGg2_TuI_aobdOhjxCpMY';
  const CHAT_ID   = '461447596';

  async function handleSubmit(e) {
    e.preventDefault();

    // 체크박스 최소 1개 검증
    const checks = document.querySelectorAll('input[name="type"]:checked');
    if (checks.length === 0) {
      alert('관심 보험 종류를 1개 이상 선택해 주세요.');
      return;
    }

    const f = e.target;
    const types = [...checks].map(c => c.value).join(', ');
    const budget = f.budget.value;

    const msg = [
      '📋 *보험 상담 신청이 들어왔습니다!*',
      '',
      `1️⃣ 성명: ${f.name.value}`,
      `2️⃣ 생년월일: ${f.birth.value}`,
      `3️⃣ 성별: ${f.gender.value}`,
      `4️⃣ 연락처: ${f.phone.value}`,
      `5️⃣ 직업: ${f.job.value}`,
      `6️⃣ 건강상태: ${f.health.value}`,
      `7️⃣ 관심 보험: ${types}`,
      `8️⃣ 월 예산: ${budget}만 원`,
      `9️⃣ 부양가족: ${f.family.value}`,
      `🔟 상담 희망 시간: ${f.time.value}`,
      f.memo.value ? `\n💬 요청사항: ${f.memo.value}` : '',
    ].filter(l => l !== undefined).join('\n');

    const btn = document.querySelector('.btn-submit');
    btn.disabled = true;
    btn.textContent = '전송 중...';

    try {
      const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: CHAT_ID, text: msg, parse_mode: 'Markdown' })
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.description);

      document.getElementById('overlay').classList.add('show');
    } catch (err) {
      alert('전송 실패: ' + err.message + '\n\nBot Token 또는 Chat ID를 확인해 주세요.');
    } finally {
      btn.disabled = false;
      btn.textContent = '📋 상담 신청하기';
    }
  }

  function closeOverlay() {
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('surveyForm').reset();
    document.getElementById('budgetVal').textContent = '10만 원';
  }
</script>
</body>
</html>
